name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install

      - name: Build Web Assets
        run: |
          npm run build

      - name: Sync Capacitor Android
        run: |
          npx cap sync > sync_debug.log 2>&1

      - name: Upload Sync Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sync-Debug-Log
          path: sync_debug.log

      - name: Generate App Launcher Icons & Splash Screens
        run: |
          npx @capacitor/assets generate --android --yes

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaTV-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
